services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: social_media_backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      PORT: 8000

  # Streamlit Frontend
  frontend:
    build:
      context: .
      dockerfile: dockerfile.frontend
    container_name: social_media_frontend
    restart: unless-stopped
    ports:
      - "8502:8501"
    env_file:
      - .env
    environment:
      BACKEND_API_URL: http://backend:8000
      PORT: 8501
    depends_on:
      - backend